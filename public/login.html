<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angry Sender - Login</title>
  <style>
    :root {
      --bg1: #020617;
      --bg2: #0b1227;
      --card: rgba(15, 23, 42, 0.85);
      --line: #1e3a8a;
      --text1: #e2e8f0;
      --text2: #94a3b8;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(1200px 500px at -10% -20%, #1d4ed8 0%, transparent 45%),
        radial-gradient(1000px 450px at 110% 120%, #2563eb 0%, transparent 40%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      color: var(--text1);
      font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid rgba(59, 130, 246, 0.35);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(140deg, #1d4ed8, #3b82f6);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .brand-text {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #93c5fd;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0.2px;
    }

    p {
      margin: 0 0 18px;
      color: var(--text2);
      font-size: 14px;
    }

    .field { margin-bottom: 12px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      border: 1px solid #334155;
      background: #0f172a;
      color: var(--text1);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease;
    }

    input:focus { border-color: var(--accent2); }

    button {
      width: 100%;
      margin-top: 4px;
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
    }

    button:disabled { opacity: 0.7; cursor: default; }

    .msg {
      min-height: 20px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--danger);
    }

    .hint {
      margin-top: 8px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <form class="card" id="loginForm" action="/api/auth/login" method="POST">
    <div class="brand">
      <div class="brand-mark">AS</div>
      <div class="brand-text">Angry Sender</div>
    </div>
    <h1>Sign in</h1>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>

    <button id="submitBtn" type="submit">Sign in</button>
    <div class="msg" id="msg"></div>
  </form>

  <script>
    // Show server-side error from query param (set when form POST fails)
    (function showError() {
      try {
        var params = new URLSearchParams(window.location.search);
        var err = params.get('error');
        if (err) document.getElementById('msg').textContent = err;
      } catch (e) {}
    })();

    // If already authenticated, skip the login page
    (async function boot() {
      try {
        var st = await fetch('/api/auth/status', { credentials: 'same-origin', cache: 'no-store' });
        var data = await st.json();
        if (data && data.authenticated) window.location.replace('/dashboard');
      } catch (e) {}
    })();
  </script>
</body>
</html>
